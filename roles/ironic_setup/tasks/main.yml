- name: "8.10. Cadastrar Portas (MACs) e Validar"
  shell: |
    export OS_AUTH_URL=http://{{ keepalived_vip }}:5000/v3
    export OS_IDENTITY_API_VERSION=3
    export OS_USERNAME=admin
    export OS_PASSWORD={{ keystone_admin_password }}
    export OS_USER_DOMAIN_NAME=Default
    export OS_PROJECT_NAME=Datacenter
    export OS_PROJECT_DOMAIN_NAME=INB

    NODE_UUID=$(openstack baremetal node show {{ item.name }} -f value -c uuid)

    {% for mac in item.macs %}
    # Verifica se o MAC já existe (ignora case)
    if ! openstack baremetal port list -c Address -f value | grep -qi "{{ mac }}"; then
        openstack baremetal port create --node "$NODE_UUID" {{ mac }}
    fi
    {% endfor %}

    # Validação Final
    {% for mac in item.macs %}
    if ! openstack baremetal port list -c Address -f value | grep -qi "{{ mac }}"; then
        echo "ERRO: A porta MAC {{ mac }} não foi encontrada após a criação!"
        exit 1
    fi
    {% endfor %}

    echo "SUCESSO: Todas as portas MAC validadas para o node {{ item.name }}."
  loop: "{{ baremetal_nodes }}"
  register: port_creation_status
  changed_when: false # Como já sabemos que existe, podemos tratar como 'ok'
