---
- name: "10.1. Criar estrutura de diretórios"
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/skyline
    - /var/log/skyline
    - /opt/skyline_venv

- name: "10.2. Criar ponto de entrada WSGI manual"
  copy:
    dest: /etc/skyline/wsgi.py
    content: |
      import os
      import sys
      from django.core.wsgi import get_wsgi_application
      
      # Garante que o Python encontre o skyline_console dentro do venv
      sys.path.insert(0, '/opt/skyline_venv/lib/python3.12/site-packages')
      
      os.environ.setdefault('SKYLINE_CONFIG_PATH', '/etc/skyline/skyline.yaml')
      os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'skyline_console.django.settings')
      
      application = get_wsgi_application()

- name: "10.3. Instalar Skyline e Gunicorn no VENV"
  pip:
    name: [skyline-console, gunicorn, django-cors-headers]
    virtualenv: /opt/skyline_venv
    virtualenv_command: python3 -m venv

- name: "10.4. Configurar Unidade do Systemd"
  copy:
    dest: /etc/systemd/system/skyline.service
    content: |
      [Unit]
      Description=OpenStack Skyline Dashboard
      After=network.target

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/etc/skyline
      Environment=PYTHONPATH=/etc/skyline:/opt/skyline_venv/lib/python3.12/site-packages
      Environment=SKYLINE_CONFIG_PATH=/etc/skyline/skyline.yaml
      ExecStart=/opt/skyline_venv/bin/gunicorn -b 127.0.0.1:9999 wsgi:application --workers 4
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: "10.5. Aplicar configuração Nginx"
  copy:
    dest: /etc/nginx/sites-available/skyline.conf
    content: |
      server {
          listen 80;
          server_name {{ keepalived_vip }};
          return 301 https://$host$request_uri\;
      }
      server {
          listen 443 ssl;
          server_name {{ keepalived_vip }};
          ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
          ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
          location / {
              proxy_pass http://127.0.0.1:9999\;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }

- name: "10.6. Reiniciar todos os serviços"
  shell: |
    systemctl daemon-reload
    systemctl restart skyline
    systemctl restart nginx
  changed_when: true
